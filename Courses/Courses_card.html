<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Aapki global CSS yahan hogi, jaise Header.css aur style.css -->


    <title>Grow All Coaching – Grow More</title>
</head>

<body>

    <div class="crse-gac-shell-wrapper">
        <main>
            <section class="crse-gac-catalog-section" id="crse-gac-courses">
                <div class="crse-gac-section-heading">
                    <h2>Choose your next skill.</h2>
                    <p>Hand-picked courses to take you from beginner to confident builder.</p>
                </div>

                <div class="crse-gac-catalog-tools">
                    <label class="crse-gac-search-box" aria-label="Search courses">
                        <span>⌕</span>
                        <input id="crse-gac-search-input" type="search" placeholder="Search courses..."
                            autocomplete="off" />
                    </label>

                    <!-- Isko empty rakha hai, JS automatically chips daal dega Supabase se -->
                    <div class="crse-gac-filter-list" aria-label="Course categories"></div>
                </div>

                <div class="crse-gac-course-grid" id="crse-gac-course-grid"></div>

            </section>
        </main>
    </div>

</body>

</html>
